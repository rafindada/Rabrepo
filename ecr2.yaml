AWSTemplateFormatVersion: '2010-09-09'
Description: ECS Fargate with ALB, ECR image, and auto-created execution role

Parameters:

  VpcId:
    Type: AWS::EC2::VPC::Id
    Default: vpc-0a43371746af7e3a4   # 🔹 REPLACE

  PublicSubnets:
    Type: List<AWS::EC2::Subnet::Id>
    Default: subnet-082cd054f9f266f3d,subnet-0279a0a31c14bd90f # 🔹 ALB subnets

  PrivateSubnets:
    Type: List<AWS::EC2::Subnet::Id>
    Default: subnet-020ae13fd17ec153d,subnet-0279a0a31c14bd90f   # 🔹 ECS subnets

  SecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Default: sg-098da922a917bfb3d   # 🔹 Must allow HTTP (80)

  ContainerImage:
    Type: String
    Default: 237183048886.dkr.ecr.us-east-1.amazonaws.com/hello-world-ecs  # 🔹 YOUR ECR IMAGE

  ContainerPort:
    Type: Number
    Default: 80

Resources:

  # -----------------------
  # ECS Cluster
  # -----------------------
  ECSCluster:
    Type: AWS::ECS::Cluster

  # -----------------------
  # ✅ FIX: Execution Role (CORRECTLY CONFIGURED)
  # -----------------------
  ECSTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ecsTaskExecutionRoleCFN
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole

      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  # -----------------------
  # Load Balancer
  # -----------------------
  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: ecs-alb
      Scheme: internet-facing
      Subnets: !Ref PublicSubnets
      SecurityGroups:
        - !Ref SecurityGroupId
      Type: application

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      VpcId: !Ref VpcId
      Port: !Ref ContainerPort
      Protocol: HTTP
      TargetType: ip
      HealthCheckPath: /

  Listener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  # -----------------------
  # Task Definition
  # -----------------------
  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Cpu: "256"
      Memory: "512"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE

      # ✅ USE THE FIXED ROLE
      ExecutionRoleArn: !GetAtt ECSTaskExecutionRole.Arn

      ContainerDefinitions:
        - Name: app-container
          Image: !Ref ContainerImage
          PortMappings:
            - ContainerPort: !Ref ContainerPort

  # -----------------------
  # ECS Service
  # -----------------------
  ECSService:
    Type: AWS::ECS::Service
    DependsOn: Listener
    Properties:
      Cluster: !Ref ECSCluster
      LaunchType: FARGATE
      DesiredCount: 2

      TaskDefinition: !Ref TaskDefinition

      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets: !Ref PrivateSubnets
          SecurityGroups:
            - !Ref SecurityGroupId

      LoadBalancers:
        - ContainerName: app-container
          ContainerPort: !Ref ContainerPort
          TargetGroupArn: !Ref TargetGroup

Outputs:

  LoadBalancerDNS:
    Description: Open this in your browser
    Value: !GetAtt LoadBalancer.DNSName

  ClusterName:
    Value: !Ref ECSCluster
